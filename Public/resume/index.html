<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
        <title>个人简历</title>
    </head>
    <body>
        <div id='viewer'></div>
        <script src='/pdf/lib/webviewer.min.js'></script>
        <script>
            // Documentation: https://pdfjs.express/documentation
            WebViewer({
                path: '/pdf/lib',
                licenseKey: 'E3TwY8LVdR4Li0xkqWbl',
                initialDoc: '/resume/wangzhizhou.pdf',
                isReadOnly: true,
                filename: '个人简历',
            }, document.getElementById('viewer'))
            .then(instance => {
                // now you can access APIs through the WebViewer instance
                const { Core, UI } = instance;
                
                // Theme
                instance.UI.setTheme('dark');
                
                // Fit Mode
                var FitMode = instance.UI.FitMode;
                instance.UI.setFitMode(FitMode.FitPage);
                
                // Layout Mode
                const LayoutMode = instance.UI.LayoutMode;
                instance.UI.setLayoutMode(LayoutMode.Continuous);
                
                // Page Size
                const viewer = document.getElementById('viewer');
                viewer.setAttribute('style', 'height: 100vh; width: 100vw');
            });
        </script>
    </body>
</html>
